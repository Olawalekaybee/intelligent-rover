[platformio]
default_envs = esp32s3-main

[env:esp32s3-main]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder

; ESP32-S3-N16R8: 16MB flash
; Main controller does not need PSRAM
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = partitions.csv

build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D ROVER_MAIN_CONTROLLER
    -D ENABLE_OTA
    -D ENABLE_BLE
    -D ENABLE_THINGSPEAK
    -D ENABLE_BATTERY_MONITOR
    -I include
    -I include/config
    -I include/pins
    -I lib/TelemetryManager

lib_deps =
    adafruit/Adafruit BME280 Library
    adafruit/Adafruit Unified Sensor
    mikalhart/TinyGPSPlus
    bblanchon/ArduinoJson
    h2zero/NimBLE-Arduino

upload_protocol = esptool

; OTA upload — uncomment after first USB flash
; upload_protocol = espota
; upload_port = rover-main.local
; upload_flags =
;     --auth=rover-ota-2025